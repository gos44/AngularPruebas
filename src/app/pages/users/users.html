<app-title title="Lista de Usuarios"></app-title>

@if (userService.loading()) {
  <div class="flex justify-center items-center h-20">
    <p class="text-gray-500 animate-pulse">Cargando usuarios...</p>
  </div>
} @else {
  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
    @for (user of userService.users(); track user.id) {
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 hover:shadow-md transition-shadow">
        <div class="flex items-center gap-4">
          @if (user.avatar) {
            <img [src]="user.avatar" class="size-12 rounded-full object-cover" [alt]="user.name">
          } @else {
            <div class="size-12 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold">
              {{ user.name.charAt(0) }}
            </div>
          }
          <div>
            <h3 class="font-semibold text-gray-800">{{ user.name }}</h3>
            <p class="text-sm text-gray-500">{{ user.email }}</p>
          </div>
        </div>
        <div class="mt-4 flex justify-end">
          <a [routerLink]="['/dasboard/user', user.id]" 
             class="text-sm text-blue-600 hover:text-blue-800 font-medium">
            Ver detalles →
          </a>
        </div>
      </div>
    } @empty {
      <div class="col-span-full text-center py-10 bg-gray-50 rounded-xl border-2 border-dashed border-gray-200">
        <p class="text-gray-400">No se encontraron usuarios.</p>
      </div>
    }
  </div>
}
