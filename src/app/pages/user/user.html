<app-title [title]="titleLabel()"></app-title>

<div class="container">
    @if (user()) {
        <div class="user-card">
            <div class="user-header">
                @if (user()?.avatar) {
                    <img [src]="user()?.avatar" [alt]="user()?.name" class="avatar shadow">
                } @else {
                    <div class="avatar shadow generic">
                        {{ user()?.name?.charAt(0) }}
                    </div>
                }
                <div class="info">
                    <h2>{{ user()?.name }}</h2>
                    <p class="email">{{ user()?.email }}</p>
                    <span class="id-badge">ID: #{{ user()?.id }}</span>
                </div>
            </div>

            <div class="divider"></div>

            <div class="stats">
                <div class="stat">
                    <span class="label">Tareas</span>
                    <span class="value">{{ user()?.tasks_count || 0 }}</span>
                </div>
                <div class="stat">
                    <span class="label">Registro</span>
                    <span class="value">{{ user()?.created_at | date:'dd/MM/yyyy' }}</span>
                </div>
            </div>
        </div>
    } @else {
        <div class="loader">
            <div class="spinner"></div>
            <p>Buscando información del usuario...</p>
        </div>
    }
</div>
